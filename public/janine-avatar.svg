<!-- TODO: Durch echtes Foto von Janine ersetzen -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E2F0DB"/>
      <stop offset="1" stop-color="#C8DFBE"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5E1CE"/>
      <stop offset="1" stop-color="#E9CDAF"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7A4A2B"/>
      <stop offset="1" stop-color="#4A2D1A"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2D6A4F"/>
      <stop offset="1" stop-color="#1F5038"/>
    </linearGradient>
  </defs>

  <!-- background circle -->
  <rect width="200" height="200" fill="url(#bg)"/>

  <!-- subtle dot accents -->
  <circle cx="30" cy="30" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="170" cy="40" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="25" cy="160" r="1.5" fill="rgba(255,255,255,0.4)"/>

  <!-- shoulders / collarbone -->
  <path d="M 15 200 Q 15 145 55 128 L 145 128 Q 185 145 185 200 Z" fill="url(#shirt)"/>
  <!-- collar v -->
  <path d="M 88 128 L 100 148 L 112 128 Z" fill="url(#bg)" opacity="0.4"/>

  <!-- neck -->
  <path d="M 88 108 L 88 132 Q 100 140 112 132 L 112 108 Z" fill="url(#skin)"/>
  <!-- neck shadow -->
  <path d="M 88 128 Q 100 136 112 128 L 112 132 Q 100 140 88 132 Z" fill="rgba(0,0,0,0.08)"/>

  <!-- head -->
  <ellipse cx="100" cy="82" rx="34" ry="38" fill="url(#skin)"/>

  <!-- hair back -->
  <path d="M 62 85 Q 58 115 68 128 L 62 130 Q 54 118 56 92 Q 58 55 100 48 Q 142 55 144 92 Q 146 118 138 130 L 132 128 Q 142 115 138 85 Q 138 60 100 58 Q 62 60 62 85 Z" fill="url(#hair)"/>
  <!-- hair top/bangs -->
  <path d="M 66 78 Q 68 50 100 48 Q 132 50 134 78 Q 128 66 115 62 Q 110 68 100 68 Q 90 68 85 62 Q 72 66 66 78 Z" fill="url(#hair)"/>

  <!-- eyebrows -->
  <path d="M 82 76 Q 87 73 93 75" stroke="#4A2D1A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 107 75 Q 113 73 118 76" stroke="#4A2D1A" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- eyes -->
  <ellipse cx="87" cy="84" rx="2" ry="2.5" fill="#2C1810"/>
  <ellipse cx="113" cy="84" rx="2" ry="2.5" fill="#2C1810"/>
  <circle cx="87.5" cy="83.5" r="0.6" fill="#FFFFFF"/>
  <circle cx="113.5" cy="83.5" r="0.6" fill="#FFFFFF"/>

  <!-- nose -->
  <path d="M 100 88 Q 98 96 100 99 Q 102 98 103 96" stroke="#C8A380" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- mouth / smile -->
  <path d="M 92 106 Q 100 112 108 106" stroke="#A65B4A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 93 106 Q 100 109 107 106" fill="#D98878" opacity="0.5"/>

  <!-- cheek blush -->
  <circle cx="78" cy="95" r="4" fill="#F0A89A" opacity="0.35"/>
  <circle cx="122" cy="95" r="4" fill="#F0A89A" opacity="0.35"/>

  <!-- leaf badge on shirt -->
  <circle cx="100" cy="170" r="11" fill="rgba(255,255,255,0.15)"/>
  <path d="M 95 170 Q 100 160 105 170 Q 100 180 95 170 Z" fill="#FFFFFF"/>
  <path d="M 100 163 L 100 177" stroke="#2D6A4F" stroke-width="0.8"/>
</svg>
